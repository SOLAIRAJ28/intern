services:
  # Backend API Service
  - type: web
    name: shanruck-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: EMAIL_HOST
        value: smtpout.secureserver.net
      - key: EMAIL_PORT
        value: 465
      - key: EMAIL_USER
        sync: false # Set in Render dashboard
      - key: EMAIL_PASS
        sync: false # Set in Render dashboard
      - key: EMAIL_TO
        sync: false # Set in Render dashboard
    healthCheckPath: /

  # Frontend Static Site
  - type: web
    name: shanruck-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
