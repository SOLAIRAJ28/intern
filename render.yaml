services:
  # Backend API Service
  - type: web
    name: shanruck-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: EMAIL_HOST
        value: smtpout.secureserver.net
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        value: info@shanrucktechnologies.in
      - key: EMAIL_PASS
        sync: false # Set in Render dashboard
      - key: EMAIL_TO
        value: info@shanrucktechnologies.in
      - key: RESEND_API_KEY
        sync: false # Set in Render dashboard
      - key: FRONTEND_ORIGINS
        value: https://shanruck-frontend.onrender.com,https://shanrucktechnologies.in,https://www.shanrucktechnologies.in
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: shanruck-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://shanruck-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
